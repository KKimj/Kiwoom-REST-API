<!doctype html>
<html lang="ko">
  <head>
    <title>키움 REST API</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #viewer-nav {
        position: fixed; top: 0; right: 0; z-index: 9999;
        display: flex; font-family: sans-serif; font-size: 13px;
      }
      #viewer-nav a, #viewer-nav button {
        padding: 6px 14px; text-decoration: none; border: none; cursor: pointer;
        background: #1a1a2e; color: #aaa; border-left: 1px solid #333;
      }
      #viewer-nav a.active { color: #fff; background: #2d2d4e; }
      #viewer-nav .sep { padding: 6px 0; background: #1a1a2e; border-left: 1px solid #555; }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem("kiwoom-theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var dark = stored ? stored === "dark" : prefersDark;
        document.getElementById("api-reference") ||
          document.addEventListener("DOMContentLoaded", function () {
            var el = document.getElementById("api-reference");
            if (el) el.dataset.configuration = JSON.stringify({ theme: "purple", darkMode: dark });
          });
        window.__kiwoomDark = dark;
      })();
    </script>
  </head>
  <body>
    <nav id="viewer-nav">
      <a href="./index.html" class="active">Scalar</a>
      <a href="./swagger.html">Swagger UI</a>
      <span class="sep"></span>
      <a href="../ko/" class="active">KO</a>
      <a href="../en/">EN</a>
      <span class="sep"></span>
      <button id="theme-btn" onclick="
        var next = localStorage.getItem('kiwoom-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem('kiwoom-theme', next);
        location.reload();
      "></button>
    </nav>
    <script id="api-reference" data-url="../openapi.json"></script>
    <script>
      document.getElementById("api-reference").dataset.configuration =
        JSON.stringify({ theme: "purple", darkMode: window.__kiwoomDark });
      document.getElementById("theme-btn").textContent = window.__kiwoomDark ? "☀" : "☾";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
