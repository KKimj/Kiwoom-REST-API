<!doctype html>
<html lang="ko">
  <head>
    <title>키움 REST API</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="키움증권 REST API 공식 포털에서 자동 생성된 OpenAPI 3.1.0 명세 뷰어." />
    <meta property="og:title" content="키움 REST API" />
    <meta property="og:description" content="키움증권 REST API OpenAPI 3.1.0 명세 — 공식 포털에서 매일 자동 생성." />
    <style>
      #viewer-nav {
        position: fixed; top: 0; right: 0; z-index: 9999;
        display: flex; font-family: sans-serif; font-size: 13px;
      }
      #viewer-nav a, #viewer-nav button {
        padding: 6px 14px; text-decoration: none; border: none; cursor: pointer;
        background: #1a1a2e; color: #aaa; border-left: 1px solid #333;
      }
      #viewer-nav a.active { color: #fff; background: #2d2d4e; }
      #viewer-nav .sep { padding: 6px 0; background: #1a1a2e; border-left: 1px solid #555; }
    </style>
  </head>
  <body>
    <nav id="viewer-nav">
      <a href="./index.html" class="active">Scalar</a>
      <a href="./swagger.html">Swagger UI</a>
      <span class="sep"></span>
      <a href="../ko/" class="active">KO</a>
      <a href="../en/">EN</a>
      <span class="sep"></span>
      <button id="theme-btn"></button>
    </nav>

    <script id="api-reference" data-url="../openapi.json"></script>

    <script>
      (function () {
        var stored = localStorage.getItem("kiwoom-theme");
        var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;

        var btn = document.getElementById("theme-btn");
        btn.textContent = dark ? "☀" : "☾";
        btn.onclick = function () {
          var next = localStorage.getItem("kiwoom-theme") === "light" ? "dark" : "light";
          localStorage.setItem("kiwoom-theme", next);
          location.reload();
        };

        fetch("../openapi.json")
          .then(function (r) { return r.json(); })
          .then(function (spec) {
            spec.info.title = "키움 REST API";
            spec.info.description = [
              "[키움증권](https://www.kiwoom.com) REST API — 국내 최대 규모 리테일 증권사.",
              "",
              "이 명세는 [키움 공식 개발자 포털](https://openapi.kiwoom.com) AJAX에서 **매일 자동 생성**되며,",
              "트레이딩, 시세, 계좌 관리 등 총 " + Object.keys(spec.paths).length + "개 엔드포인트를 포함합니다.",
              "",
              "> **⚠ 참고:** 각 operation의 `x-real-path`가 실제 HTTP 경로입니다.",
              "> 여기 표시된 path의 마지막 세그먼트는 `api-id` 헤더값(라우팅 식별자)이며 URL로 직접 사용하지 않습니다.",
              "",
              "---",
              "",
              "## 🚀 시작하기",
              "",
              "키움 REST API는 계정 생성 및 API 승인 후 사용할 수 있습니다.",
              "아래 순서대로 진행하세요:",
              "",
              "**1단계 — 키움증권 계좌 개설**",
              "[kiwoom.com](https://www.kiwoom.com)에서 회원가입 후 본인인증을 완료합니다.",
              "",
              "**2단계 — API 사용 신청 및 약관 동의**",
              "[키움 OpenAPI 포털](https://openapi.kiwoom.com) 로그인 → *마이페이지* → *API 신청*.",
              "API 이용 약관을 확인하고 동의합니다.",
              "",
              "**3단계 — API 호출 허용 IP 등록**",
              "사전에 등록된 IP에서만 API를 호출할 수 있습니다.",
              "포털 *마이페이지* → *IP 관리*에서 서버 IP를 추가합니다.",
              "",
              "**4단계 — 거래 환경 선택**",
              "| 환경 | Base URL | 용도 |",
              "|---|---|---|",
              "| **실거래** | `https://api.kiwoom.com` | 실제 자금, 실제 시장 |",
              "| **모의거래** | `https://mockapi.kiwoom.com` | 가상 주문, 자금 위험 없음 |",
              "",
              "> 💡 처음에는 **모의거래** (`mockapi.kiwoom.com`)로 시작해 금전적 위험 없이 테스트하세요.",
              "",
              "**5단계 — 접근토큰 발급**",
              "포털에서 발급받은 `app_key`와 `secret_key`로 `POST /oauth2/token/au10001`을 호출합니다.",
              "응답의 `token`을 이후 모든 요청에 아래와 같이 전달합니다:",
              "```",
              "Authorization: Bearer <token>",
              "api-id: <operation별 id, 예: ka10001>",
              "```",
              "",
              "**6단계 — API 호출**",
              "모든 엔드포인트는 고정 경로(`/api/dostk/stkinfo`, `/oauth2/token` 등)에 `POST`로 호출합니다.",
              "`api-id` 헤더가 실제 operation을 결정하며, URL 경로가 아닙니다.",
              "",
              "---",
              "",
              "출처: [KKimj/Kiwoom-REST-API](https://github.com/KKimj/Kiwoom-REST-API)",
            ].join("\n");

            var el = document.getElementById("api-reference");
            el.dataset.configuration = JSON.stringify({
              theme: "purple",
              darkMode: dark,
              spec: { content: spec },
            });

            var s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/@scalar/api-reference";
            document.body.appendChild(s);
          });
      })();
    </script>
  </body>
</html>
