name: Lint

on:
  push:
    paths:
      - 'openapi.json'
      - 'scripts/**'
      - 'build/**'
      - 'packages/typescript/**'
      - 'packages/dart/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'openapi.json'
      - 'scripts/**'
      - 'build/**'
      - 'packages/typescript/**'
      - 'packages/dart/**'
      - 'pyproject.toml'

jobs:
  lint-openapi:
    name: OpenAPI (Redocly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx --yes @redocly/cli lint openapi.json

  lint-python:
    name: Python (ruff check + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check scripts/ build/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check scripts/ build/

  lint-typescript:
    name: TypeScript (ESLint + Prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json
      - run: npm ci
        working-directory: packages/typescript
      - run: npm run lint
        working-directory: packages/typescript
      - run: npm run format:check
        working-directory: packages/typescript
      - run: npm run build
        working-directory: packages/typescript

  lint-dart:
    name: Dart (analyze + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
        working-directory: packages/dart
      - run: dart analyze packages/dart
      - run: dart format --output=none --set-exit-if-changed packages/dart/lib packages/dart/bin
