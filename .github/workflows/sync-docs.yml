name: Sync docs/openapi.json

on:
  push:
    branches: [main]
    paths:
      - 'openapi.json'
  workflow_dispatch:

jobs:
  sync:
    name: Draft PR if docs out of sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check sync state
        id: check
        run: |
          if diff -q openapi.json docs/openapi.json > /dev/null 2>&1; then
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch, PR, and enable auto-merge
        if: steps.check.outputs.in_sync == 'false'
        run: |
          DATE=$(date +%Y%m%d)
          BRANCH="sync/docs-openapi-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cp openapi.json docs/openapi.json
          git add docs/openapi.json
          git commit -m "sync: docs/openapi.json ← openapi.json (${DATE})"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "sync: docs/openapi.json 업데이트 (${DATE})" \
            --body "docs/openapi.json을 openapi.json과 동기화합니다. (자동 생성)" \
            --head "$BRANCH" \
            --base main)
          echo "PR: $PR_URL"
          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr merge "$PR_NUM" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
