name: Sync docs/openapi.json

on:
  push:
    branches: [main]
    paths:
      - 'openapi.json'
  workflow_dispatch:

jobs:
  sync:
    name: Draft PR if docs out of sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check sync state
        id: check
        run: |
          if diff -q openapi.json docs/openapi.json > /dev/null 2>&1; then
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and open Draft PR
        if: steps.check.outputs.in_sync == 'false'
        run: |
          DATE=$(date +%Y%m%d)
          BRANCH="sync/docs-openapi-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cp openapi.json docs/openapi.json
          git add docs/openapi.json
          git commit -m "sync: docs/openapi.json ← openapi.json (${DATE})"
          git push origin "$BRANCH"
          gh pr create --draft \
            --title "sync: docs/openapi.json 업데이트 (${DATE})" \
            --body "$(cat <<'BODY'
## Auto-sync: docs/openapi.json

\`openapi.json\` 변경이 감지되어 \`docs/openapi.json\`이 뒤처진 상태입니다.

내용 확인 후 머지하면 GitHub Pages가 최신 스펙으로 갱신됩니다.

> 이 PR은 [sync-docs workflow](.github/workflows/sync-docs.yml)에 의해 자동 생성되었습니다.
BODY
)" \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
